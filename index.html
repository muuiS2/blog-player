<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <title>nostalgia room...</title>
<style>
body {
  margin: 0;
  overflow: hidden;
}

.blog-frame {
  width: 100vw;
  height: 100vh;
  border: none;
}

/* 🎧 플레이어 */
.player {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 60px;
  height: 60px;

  background: rgba(220, 220, 220, 0.75); /* 반투명 */
  backdrop-filter: blur(4px); /* 유리 느낌 */

  border-radius: 50%;
  overflow: hidden;
  z-index: 9999;
  transition: 0.3s;
  color: #555;

  box-shadow: 0 0 8px rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.4);
}

.player.open {
  width: 260px;
  height: 260px;
  border-radius: 15px;

  background: rgba(220, 220, 220, 0.85);
}

/* 버튼 */
.toggle {
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
}

/* 내용 */
.content {
  display: none;
  padding: 10px;
}

.player.open .content {
  display: block;
}

/* 유튜브 */
.player iframe {
  width: 100%;
  height: 150px;
  border: none;
  border-radius: 8px;
}

/* 닫기 버튼 */
.close-btn {
  margin-top: 5px;
  width: 100%;
  background: #cfcfcf;
  color: #444;
  border: none;
  padding: 5px;
  cursor: pointer;
  border-radius: 5px;
}
</style>

</head>

<body>

<!-- 📄 블로그 -->
<iframe src="https://ourazem.blog.fc2.com/" class="blog-frame"></iframe>

<!-- 🎧 플레이어 -->
<div class="player" id="player">

  <div class="toggle" onclick="togglePlayer()">♬</div>

  <div class="content">

    <iframe 
      src="https://www.youtube.com/embed/videoseries?list=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq&autoplay=1&mute=0&loop=1"
      allow="autoplay">
    </iframe>

    <button class="close-btn" onclick="togglePlayer()">닫기</button>

  </div>
</div>

<script>
function togglePlayer() {
  document.getElementById("player").classList.toggle("open");
}
</script>


<img id="shimeji" src="" style="
  position: fixed;
  width: 120px;
  left: 100px;
  top: 100px;
  z-index: 9999;
  pointer-events: none;
">

<script>
// 🎨 이미지 넣는 곳 (여기만 수정!!)
const sprites = {
  down: [
    "https://i.imgur.com/5JH2HqN.png",
    "https://i.imgur.com/9IpmQaN.png",
    "https://i.imgur.com/FJh2LPr.png"
  ],
  up: [
    "https://i.imgur.com/eiulE3a.png",
    "https://i.imgur.com/dAudV3g.png",
    "https://i.imgur.com/wHNO6s0.png"
  ],
  left: [
    "https://i.imgur.com/Rp4MyTo.png",
    "https://i.imgur.com/dqR3wTc.png",
    "https://i.imgur.com/sT4sYoE.png"
  ],
  right: [
    "https://i.imgur.com/gfhylI8.png",
    "https://i.imgur.com/AvUePs9.png",
    "https://i.imgur.com/IIzugPg.png"
  ]
};

const el = document.getElementById("shimeji");

let x = 100;
let y = 100;

let dir = "right";
let frame = 0;
let state = "walk";

// 🎲 랜덤 방향
function randomDir() {
  const dirs = ["up","down","left","right"];
  return dirs[Math.floor(Math.random()*4)];
}

// 🎲 랜덤 상태 변경
function randomState() {
  if (Math.random() < 0.02) {
    state = (state === "walk") ? "idle" : "walk";
    if (state === "walk") dir = randomDir();
  }
}

// 🎮 이동
function move() {
  if (state === "walk") {
    if (dir === "right") x += 1;
    if (dir === "left") x -= 1;
    if (dir === "down") y += 1;
    if (dir === "up") y -= 1;

    // 화면 벽 처리
    if (x < 0) x = 0;
    if (x > window.innerWidth - 96) x = window.innerWidth - 96;
    if (y < 0) y = 0;
    if (y > window.innerHeight - 96) y = window.innerHeight - 96;

    el.style.left = x + "px";
    el.style.top = y + "px";

    // 걷기 애니메이션 (삐그덕 느낌)
    frame++;
    let f = frame % 3;
    el.src = sprites[dir][f];
  }

  if (state === "idle") {
    el.src = sprites[dir][0]; // 정지
  }

  randomState();
}

// ⏱ 실행
setInterval(move, 120); // ← 숫자 크면 더 "도트스럽게" 끊김 느낌
</script>
  
</body>
</html>
