<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>My Blog Player</title>

<style>
body {
  margin: 0;
  overflow-x: hidden;
}

/* 📄 블로그 */
.blog-frame {
  width: 100%;
  height: 100vh;
  border: none;
}

/* 🎬 플레이어 (접이식) */
.yt-box {
  position: fixed;
  right: 0;
  top: 300px; /* 위치 조절 */
  width: 60px;
  transition: 0.3s;
  z-index: 9999;
}

/* 펼쳐짐 */
.yt-box.open {
  width: 260px;
}

/* 버튼 */
.yt-toggle {
  width: 60px;
  height: 60px;
  cursor: pointer;
  background: #222;
  color: #fff;
  border: none;
}

/* 영상 영역 */
.yt-content {
  display: none;
  background: #000;
  padding: 5px;
}

.yt-box.open .yt-content {
  display: block;
}

.yt-content iframe {
  width: 100%;
  height: 150px;
  border: none;
}
</style>

</head>

<body>

<!-- 📄 블로그 -->
<iframe 
  src="https://ourazem.blog.fc2.com/" 
  class="blog-frame">
</iframe>

<!-- 🎬 접이식 유튜브 -->
<div class="yt-box" id="ytBox">

  <button class="yt-toggle" onclick="toggleYT()">🎵</button>

  <div class="yt-content">
    <iframe 
      src="https://www.youtube.com/embed/videoseries?list=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq&autoplay=1&mute=1&loop=1&playlist=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq"
      allow="autoplay">
    </iframe>
  </div>

</div>

<script>
function toggleYT() {
  const box = document.getElementById("ytBox");
  box.classList.toggle("open");
}
</script>

</body>
</html>
