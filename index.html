<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <title>nostalgia room...</title>
<style>
body {
  margin: 0;
  overflow: hidden;
}

.blog-frame {
  width: 100vw;
  height: 100vh;
  border: none;
}

/* 🎧 플레이어 */
.player {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 60px;
  height: 60px;

  background: rgba(220, 220, 220, 0.75); /* 반투명 */
  backdrop-filter: blur(4px); /* 유리 느낌 */

  border-radius: 50%;
  overflow: hidden;
  z-index: 9999;
  transition: 0.3s;
  color: #555;

  box-shadow: 0 0 8px rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.4);
}

.player.open {
  width: 260px;
  height: 260px;
  border-radius: 15px;

  background: rgba(220, 220, 220, 0.85);
}

/* 버튼 */
.toggle {
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
}

/* 내용 */
.content {
  display: none;
  padding: 10px;
}

.player.open .content {
  display: block;
}

/* 유튜브 */
.player iframe {
  width: 100%;
  height: 150px;
  border: none;
  border-radius: 8px;
}

/* 닫기 버튼 */
.close-btn {
  margin-top: 5px;
  width: 100%;
  background: #cfcfcf;
  color: #444;
  border: none;
  padding: 5px;
  cursor: pointer;
  border-radius: 5px;
}
</style>

</head>

<body>

<!-- 📄 블로그 -->
<iframe src="https://ourazem.blog.fc2.com/" class="blog-frame"></iframe>

<!-- 🎧 플레이어 -->
<div class="player" id="player">

  <div class="toggle" onclick="togglePlayer()">♬</div>

  <div class="content">

    <iframe 
      src="https://www.youtube.com/embed/videoseries?list=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq&autoplay=1&mute=0&loop=1"
      allow="autoplay">
    </iframe>

    <button class="close-btn" onclick="togglePlayer()">닫기</button>

  </div>
</div>

//여기서 부터 시메지
  
<img id="shimeji" src="" style="
  position: fixed;
  width: 120px;
  left: 100px;
  top: 100px;
  z-index: 9999;
  cursor: grab;
">

<script>
// 🎨 이미지 설정
const sprites = {
  down: ["https://i.imgur.com/5JH2HqN.png","https://i.imgur.com/9IpmQaN.png","https://i.imgur.com/FJh2LPr.png"],
  up: ["https://i.imgur.com/Rp4MyTo.png","https://i.imgur.com/dqR3wTc.png","https://i.imgur.com/sT4sYoE.png"],
  left: ["https://i.imgur.com/AvUePs9.png1","","https://i.imgur.com/gfhylI8.png"],
  right: ["https://i.imgur.com/dAudV3g.png","https://i.imgur.com/wHNO6s0.png","https://i.imgur.com/eiulE3a.png"],

  sit: ["https://i.imgur.com/9va1waE.png"],
  sleep: [
    "https://i.imgur.com/X080JsG.png","https://i.imgur.com/xf11w31.png","https://i.imgur.com/DuInk1S.png","https://i.imgur.com/xOfN292.png","https://i.imgur.com/cPNTADo.png"
  ],

  struggle: ["https://i.imgur.com/eSQvjZg.png","https://i.imgur.com/EjO1hB6.png"],
  fall: ["https://i.imgur.com/nSgLstM.png"]
};

// 🔥 preload
Object.values(sprites).flat().forEach(src => {
  const img = new Image();
  img.src = src;
});

const el = document.getElementById("shimeji");

let x = 100;
let y = 100;

let dir = "right";
let frame = 0;
let state = "walk";

let dirTimer = 0;

// 🖱️ 드래그 상태
let dragging = false;

// 🎲 방향
function randomDir() {
  const dirs = ["up","down","left","right"];
  return dirs[Math.floor(Math.random()*4)];
}

// 🎲 상태 변경
function randomState() {
  if (dragging) return;

  dirTimer--;

  if (dirTimer <= 0) {
    dir = randomDir();
    dirTimer = Math.floor(Math.random() * 100) + 50;
  }

  // 앉기 확률
  if (Math.random() < 0.005) {
    state = "sit";
    setTimeout(() => {
      state = "sleep";
    }, 2000);
  }

  // 다시 걷기
  if (Math.random() < 0.01 && state !== "sleep") {
    state = "walk";
  }
}

// 🎮 이동
function move() {

  if (dragging) {
    // 버둥 애니
    frame++;
    el.src = sprites.struggle[frame % 2];
    return;
  }

  if (state === "walk") {

    if (dir === "right") x += 1;
    if (dir === "left") x -= 1;
    if (dir === "down") y += 1;
    if (dir === "up") y -= 1;

    // 벽
    if (x <= 0) dir = "right";
    if (x >= window.innerWidth - 120) dir = "left";
    if (y <= 0) dir = "down";
    if (y >= window.innerHeight - 120) dir = "up";

    el.style.left = x + "px";
    el.style.top = y + "px";

    frame++;
    el.src = sprites[dir][frame % 3];
  }

  if (state === "sit") {
    el.src = sprites.sit[0];
  }

  if (state === "sleep") {
    frame++;
    el.src = sprites.sleep[frame % sprites.sleep.length];
  }

  randomState();
}

// 🖱️ 클릭 잡기
el.onmousedown = (e) => {
  dragging = true;
  el.style.cursor = "grabbing";
};

// 🖱️ 놓기 → 떨어지기
window.onmouseup = () => {
  if (!dragging) return;

  dragging = false;
  el.style.cursor = "grab";

  state = "fall";

  let fallY = y;
  let target = y + 100;

  function falling() {
    fallY += 5;
    el.src = sprites.fall[0];
    el.style.top = fallY + "px";

    if (fallY < target) {
      requestAnimationFrame(falling);
    } else {
      y = fallY;
      state = "walk";
    }
  }

  falling();
};

// 🖱️ 드래그 이동
window.onmousemove = (e) => {
  if (!dragging) return;

  x = e.clientX - 60;
  y = e.clientY - 60;

  el.style.left = x + "px";
  el.style.top = y + "px";
};

// ⏱ 실행
setInterval(move, 120);
</script>
