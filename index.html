<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mini Player Blog</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

.blog-frame {
  width: 100vw;
  height: 100vh;
  border: none;
}

/* 🎧 플레이어 */
.player {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 60px;
  height: 60px;

  background: rgba(220, 220, 220, 0.75); /* 반투명 */
  backdrop-filter: blur(4px); /* 유리 느낌 */

  border-radius: 50%;
  overflow: hidden;
  z-index: 9999;
  transition: 0.3s;
  color: #555;

  box-shadow: 0 0 8px rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.4);
}

.player.open {
  width: 260px;
  height: 260px;
  border-radius: 15px;

  background: rgba(220, 220, 220, 0.85);
}

/* 버튼 */
.toggle {
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
}

/* 내용 */
.content {
  display: none;
  padding: 10px;
}

.player.open .content {
  display: block;
}

/* 유튜브 */
.player iframe {
  width: 100%;
  height: 150px;
  border: none;
  border-radius: 8px;
}

/* 닫기 버튼 */
.close-btn {
  margin-top: 5px;
  width: 100%;
  background: #cfcfcf;
  color: #444;
  border: none;
  padding: 5px;
  cursor: pointer;
  border-radius: 5px;
}
</style>

</head>

<body>

<!-- 📄 블로그 -->
<iframe src="https://ourazem.blog.fc2.com/" class="blog-frame"></iframe>

<!-- 🎧 플레이어 -->
<div class="player" id="player">

  <div class="toggle" onclick="togglePlayer()">♬</div>

  <div class="content">

    <iframe 
      src="https://www.youtube.com/embed/videoseries?list=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq&autoplay=1&mute=0&loop=1"
      allow="autoplay">
    </iframe>

    <button class="close-btn" onclick="togglePlayer()">닫기</button>

  </div>
</div>

<script>
function togglePlayer() {
  document.getElementById("player").classList.toggle("open");
}
</script>

</body>
</html>
