<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>My Blog Player</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* 📄 블로그 */
.blog-frame {
  width: 100vw;
  height: 100vh;
  border: none;
}

/* 🎵 플레이어 (겹치기) */
.yt-box {
  position: fixed;
  right: 20px;
  top: 300px;
  width: 220px;
  z-index: 9999;
  border-radius: 10px;
  overflow: hidden;
  background: #000;
}

/* 접기 버튼 */
.yt-toggle {
  position: absolute;
  top: -35px;
  right: 0;
  background: #222;
  color: #fff;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  font-size: 12px;
}

/* 접기 상태 */
.yt-box.closed iframe {
  display: none;
}
</style>

</head>

<body>

<!-- 📄 블로그 -->
<iframe 
  src="https://ourazem.blog.fc2.com/" 
  class="blog-frame">
</iframe>

<!-- 🎵 유튜브 (항상 유지됨) -->
<div class="yt-box" id="ytBox">

  <button class="yt-toggle" onclick="toggleYT()">접기</button>

  <iframe 
    src="https://www.youtube.com/embed/videoseries?list=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq&autoplay=1&mute=0&loop=1&playlist=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq"
    width="220"
    height="124"
    frameborder="0"
    allow="autoplay">
  </iframe>

</div>

<script>
function toggleYT() {
  const box = document.getElementById("ytBox");
  box.classList.toggle("closed");
}
</script>

</body>
</html>
