<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mini Player Blog</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

/* 📄 블로그 */
.blog-frame {
  width: 100vw;
  height: 100vh;
  border: none;
}

/* 🎧 미니 플레이어 */
.player {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 60px;
  height: 60px;
  background: #111;
  border-radius: 50%;
  overflow: hidden;
  z-index: 9999;
  transition: 0.3s;
  color: #fff;
  font-size: 12px;
}

/* 펼쳐진 상태 */
.player.open {
  width: 260px;
  height: 320px;
  border-radius: 15px;
}

/* 버튼 */
.toggle {
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* 콘텐츠 */
.content {
  display: none;
  padding: 10px;
}

.player.open .content {
  display: block;
}

/* iframe */
.player iframe {
  width: 100%;
  height: 140px;
  border: none;
}

/* 플레이리스트 */
.playlist {
  margin-top: 10px;
  max-height: 120px;
  overflow-y: auto;
}

.track {
  padding: 5px;
  cursor: pointer;
}

.track:hover {
  background: #333;
}

/* 버튼들 */
.controls {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}
button {
  background: #222;
  color: #fff;
  border: none;
  padding: 3px 6px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- 📄 블로그 -->
<iframe src="https://ourazem.blog.fc2.com/" class="blog-frame"></iframe>

<!-- 🎧 플레이어 -->
<div class="player" id="player">

  <div class="toggle" onclick="togglePlayer()">🎵</div>

  <div class="content">

    <iframe id="ytplayer"></iframe>

    <div class="controls">
      <button onclick="shuffle()">🔀</button>
      <button onclick="togglePlayer()">✖</button>
    </div>

    <div class="playlist" id="playlist"></div>

  </div>
</div>

<script>
const videos = [
  "dQw4w9WgXcQ",
  "3JZ_D3ELwOQ",
  "L_jWHffIx5E",
  "Zi_XLOBDo_Y"
];

let current = 0;

function loadVideo(id) {
  document.getElementById("ytplayer").src =
    "https://www.youtube.com/embed/" + id + "?autoplay=1";
}

function renderList() {
  const list = document.getElementById("playlist");
  list.innerHTML = "";
  videos.forEach((v, i) => {
    const div = document.createElement("div");
    div.className = "track";
    div.innerText = "Track " + (i+1);
    div.onclick = () => {
      current = i;
      loadVideo(v);
    };
    list.appendChild(div);
  });
}

function shuffle() {
  current = Math.floor(Math.random() * videos.length);
  loadVideo(videos[current]);
}

function togglePlayer() {
  document.getElementById("player").classList.toggle("open");
}

// 초기 실행
renderList();
loadVideo(videos[0]);
</script>

</body>
</html>
