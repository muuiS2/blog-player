<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <title>nostalgia room...</title>
  <link rel="icon" href="https://i.imgur.com/RuGTMsY.png">
<style>
body {
  margin: 0;
  overflow: hidden;
}

.blog-frame {
  width: 100vw;
  height: 100vh;
  border: none;
}

/* 🎧 플레이어 */
.player.open {
  width: 340px;
  height: 180px;
  border-radius: 16px;
  background: rgba(220, 220, 220, 0.9);
  padding: 12px;
}

/* 내부 레이아웃 */
.player-ui {
  display: flex;
  gap: 12px;
}

/* 유튜브 정사각형 */
.player iframe {
  width: 120px;
  height: 120px;
  border-radius: 10px;
}

/* 오른쪽 영역 */
.info {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* 텍스트 */
.title {
  font-size: 13px;
  color: #444;
}

.artist {
  font-size: 11px;
  color: #777;
}

/* 컨트롤 */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
}

.controls button {
  border: none;
  background: #ddd;
  padding: 4px 6px;
  border-radius: 6px;
  cursor: pointer;
}

/* 볼륨 */
.volume {
  display: flex;
  align-items: center;
  gap: 6px;
}

.volume button {
  width: 20px;
  height: 20px;
  font-size: 12px;
  padding: 0;
}

/* 하단 바 (감성용) */
.progress {
  height: 3px;
  background: #bbb;
  border-radius: 3px;
  margin-top: 8px;
}

/* 동그라미 */
.volume-box input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px;
  height: 10px;
  background: #666;
  border-radius: 50%;
  cursor: pointer;
}

/* 아이콘 */
.vol-icon {
  font-size: 12px;
  color: #666;
}
</style>

</head>

<body>

<!-- 📄 블로그 -->
<iframe src="https://ourazem.blog.fc2.com/" class="blog-frame"></iframe>

<!-- 🎧 플레이어 -->
<div class="player" id="player">

  <!-- 접힌 상태 -->
  <div class="toggle" onclick="togglePlayer()">♬</div>

  <!-- 펼친 상태 -->
  <div class="player-header">
    <span>music</span>
    <span class="min-btn" onclick="togglePlayer()">–</span>
  </div>

  <div class="content">

    <div class="player-ui">

      <!-- 🎬 유튜브 -->
      <iframe 
        id="ytplayer"
        src="https://www.youtube.com/embed/videoseries?list=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq&enablejsapi=1&controls=0"
        allow="autoplay">
      </iframe>

      <!-- 🎵 정보 -->
      <div class="info">

        <div>
          <div class="title">Nostalgia Room</div>
          <div class="artist">playlist</div>
        </div>

        <!-- ▶ 컨트롤 -->
        <div class="controls">
          <button onclick="playVideo()">▶</button>
          <button onclick="pauseVideo()">⏸</button>

          <div class="volume">
            <button onclick="volDown()">-</button>
            <button onclick="volUp()">+</button>
          </div>
        </div>

      </div>
    </div>

    <!-- 감성 바 -->
    <div class="progress"></div>

  </div>
</div>


 <!-- 시메지 --> 
<img id="shimeji" src="" style="
  position: fixed;
  width: 120px;
  left: 100px;
  top: 100px;
  z-index: 9999;
  cursor: grab;
">

<script>
// 🎨 이미지 설정
const sprites = {
  down: ["https://i.imgur.com/5JH2HqN.png","https://i.imgur.com/9IpmQaN.png","https://i.imgur.com/FJh2LPr.png"],
  up: ["https://i.imgur.com/Rp4MyTo.png","https://i.imgur.com/dqR3wTc.png","https://i.imgur.com/sT4sYoE.png"],
  left: ["https://i.imgur.com/AvUePs9.png","https://i.imgur.com/IIzugPg.png","https://i.imgur.com/gfhylI8.png"],
  right: ["https://i.imgur.com/dAudV3g.png","https://i.imgur.com/wHNO6s0.png","https://i.imgur.com/eiulE3a.png"],

  sit: ["https://i.imgur.com/9va1waE.png"],
  sleep: [
    "https://i.imgur.com/X080JsG.png",
    "https://i.imgur.com/xf11w31.png",
    "https://i.imgur.com/DuInk1S.png",
    "https://i.imgur.com/xOfN292.png",
    "https://i.imgur.com/cPNTADo.png"
  ],

  struggle: ["https://i.imgur.com/eSQvjZg.png","https://i.imgur.com/EjO1hB6.png"],
  fall: ["https://i.imgur.com/nSgLstM.png"]
};

// 🔥 preload
Object.values(sprites).flat().forEach(src => {
  const img = new Image();
  img.src = src;
});

const el = document.getElementById("shimeji");

let x = 100;
let y = 100;

let dir = "right";
let prevDir = "right";
let frame = 0;
let state = "walk";

let dirTimer = 0;
let dragging = false;

// 😴 sleep 전용
let sleepFrame = 0;
let sleepStarted = false;

let turnDelay = 5;

// 🎲 방향
function randomDir() {
  const dirs = ["up","down","left","right"];
  return dirs[Math.floor(Math.random()*4)];
}

// 🎲 상태 변경
function randomState() {
  if (dragging) return;

  dirTimer--;

  if (dirTimer <= 0) {
    dir = randomDir();
    dirTimer = Math.floor(Math.random() * 100) + 50;
  }

  if (Math.random() < 0.005) {
    state = "sit";
    setTimeout(() => state = "sleep", 2000);
  }

  if (Math.random() < 0.01 && state !== "sleep") {
    state = "walk";
  }

  // sleep 종료 시 초기화
  if (state !== "sleep") {
    sleepStarted = false;
  }
}

// 🎮 이동
function move() {

  // 방향 바뀌면 프레임 초기화
 if (dir !== prevDir) {
  frame = 0;
  prevDir = dir;
  turnDelay = 5; // ⭐ 방향 바뀌면 잠깐 멈춤
}

  if (dragging) {
    frame++;
    el.src = sprites.struggle[frame % 2];
    return;
  }

  if (state === "walk") {

    if (turnDelay > 0) {
  turnDelay--;
  el.src = sprites[dir][0]; // 정지 이미지
  return;
    }
    
    if (dir === "right") x += 1;
    if (dir === "left") x -= 1;
    if (dir === "down") y += 1;
    if (dir === "up") y -= 1;

    // 벽 충돌
    if (x <= 0) dir = "right";
    if (x >= window.innerWidth - 120) dir = "left";
    if (y <= 0) dir = "down";
    if (y >= window.innerHeight - 120) dir = "up";

    el.style.left = x + "px";
    el.style.top = y + "px";

    frame++;
    el.src = sprites[dir][frame % 3];
  }

  if (state === "sit") {
    el.src = sprites.sit[0];
  }

  if (state === "sleep") {

    if (!sleepStarted) {
      sleepFrame = 0;
      sleepStarted = true;
      el.src = sprites.sleep[0];
      return;
    }

    frame++;

    if (frame % 15 === 0) {

      if (sleepFrame < 2) {
        sleepFrame++;
      } else {
        sleepFrame++;
        if (sleepFrame >= 5) sleepFrame = 2;
      }

      el.src = sprites.sleep[sleepFrame];
    }
  }

  randomState();
}

// 🖱️ 잡기
el.onmousedown = () => {
  dragging = true;
  el.style.cursor = "grabbing";
};

// 🖱️ 놓기
window.onmouseup = () => {
  if (!dragging) return;

  dragging = false;
  el.style.cursor = "grab";

  state = "fall";

  let fallY = y;
  let target = y + 200;

  function falling() {
    fallY += 5;
    el.src = sprites.fall[0];
    el.style.top = fallY + "px";

    if (fallY < target) {
      requestAnimationFrame(falling);
    } else {
      y = fallY;
      state = "walk";
    }
  }

  falling();
};

// 🖱️ 드래그 이동
window.onmousemove = (e) => {
  if (!dragging) return;

  x = e.clientX - 60;
  y = e.clientY - 60;

  el.style.left = x + "px";
  el.style.top = y + "px";
};

// ▶ 실행
setInterval(move, 120);

// 🎵 플레이어 버튼 (반드시 따로!)
function togglePlayer() {
  document.getElementById("player").classList.toggle("open");
}
</script>

let player;

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let currentVolume = 50;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('ytplayer');
}

// ▶ 재생
function playVideo() {
  if (player) player.playVideo();
}

// ⏸ 정지
function pauseVideo() {
  if (player) player.pauseVideo();
}

// 🔊 볼륨 +
function volUp() {
  if (player) {
    currentVolume = Math.min(100, currentVolume + 10);
    player.setVolume(currentVolume);
  }
}

// 🔉 볼륨 -
function volDown() {
  if (player) {
    currentVolume = Math.max(0, currentVolume - 10);
    player.setVolume(currentVolume);
  }
}

// 열기/닫기
function togglePlayer() {
  document.getElementById("player").classList.toggle("open");
}
</script>
