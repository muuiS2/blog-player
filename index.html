<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mini Player Blog</title>

<style>
body {
  margin: 0;
  overflow: hidden;
}

.blog-frame {
  width: 100vw;
  height: 100vh;
  border: none;
}

.player {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 60px;
  height: 60px;
  background: #111;
  border-radius: 50%;
  overflow: hidden;
  z-index: 9999;
  transition: 0.3s;
  color: #fff;
}

.player.open {
  width: 260px;
  height: 300px;
  border-radius: 15px;
}

.toggle {
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.content {
  display: none;
  padding: 10px;
}

.player.open .content {
  display: block;
}

.player iframe {
  width: 100%;
  height: 150px;
  border: none;
}

.controls {
  display: flex;
  justify-content: space-between;
  margin-top: 5px;
}

button {
  background: #222;
  color: #fff;
  border: none;
  padding: 5px;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- 📄 블로그 -->
<iframe src="https://ourazem.blog.fc2.com/" class="blog-frame"></iframe>

<!-- 🎧 플레이어 -->
<div class="player" id="player">

  <div class="toggle" onclick="togglePlayer()">🎵</div>

  <div class="content">

    <iframe 
      id="ytplayer"
      src="https://www.youtube.com/embed/videoseries?list=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq&autoplay=1&mute=0&loop=1"
      allow="autoplay">
    </iframe>

    <div class="controls">
      <button onclick="shuffle()">🔀</button>
      <button onclick="togglePlayer()">✖</button>
    </div>

  </div>
</div>

<script>
function togglePlayer() {
  document.getElementById("player").classList.toggle("open");
}

/* 🔀 랜덤 (플레이리스트 새로 로드해서 셔플 느낌) */
function shuffle() {
  const iframe = document.getElementById("ytplayer");
  iframe.src =
    "https://www.youtube.com/embed/videoseries?list=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq&autoplay=1&shuffle=1";
}
</script>

</body>
</html>
