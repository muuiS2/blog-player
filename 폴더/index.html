<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>My Blog Player</title>
</head>

<body style="margin:0; overflow:hidden;">

<!-- 🎵 유튜브 플레이어 (고정) -->
<iframe 
  src="https://www.youtube.com/embed/videoseries?list=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq&autoplay=1&mute=0&loop=1&playlist=PLaIrSWYs1VRGNj0M9FTlSk3vVAagIHBPq"

    position:fixed;
    top:50%;
    right:20px;
    transform:translateY(-50%);
    width:220px;
    height:124px;
    border:none;
    z-index:9999;
  "
  allow="autoplay"
></iframe>

<!-- 📄 FC2 블로그 전체 -->

  ">
</iframe>
