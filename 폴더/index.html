<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>nostalgia room...</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>

<body>

<!-- 블로그 -->
<iframe src="https://ourazem.blog.fc2.com/" class="blog-frame"></iframe>

<!-- 플레이어 -->
<div class="player" id="player">
  <div class="toggle" onclick="togglePlayer()">♬</div>

  <div class="player-ui">
    <iframe id="ytplayer"></iframe>

    <div class="info">
      <div id="title">loading...</div>

      <div class="controls">
        <button onclick="playVideo()">▶</button>
        <button onclick="pauseVideo()">⏸</button>
        <button onclick="volDown()">-</button>
        <button onclick="volUp()">+</button>
      </div>
    </div>
  </div>
</div>

<!-- 시메지 -->
<img id="shimeji" src="https://i.imgur.com/dAudV3g.png">

<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>

</body>
</html>
